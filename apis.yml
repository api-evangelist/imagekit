aid: apis-json-v1-9-imagekit
name: ImageKit
description: >-
  Real-time image and video optimization CDN with a REST API for media
  management, transformations, folder operations, and performance analytics.
  ImageKit provides a unified URL-based API with 50+ transformations, intelligent
  format optimization, compression, and an integrated Digital Asset Management
  (DAM) platform for managing and delivering media at scale.
